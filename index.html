<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:;">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BytesProtector</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Custom titlebar -->
  <div id="titlebar">
    <div id="titlebar-drag">
      <img src="../assets/icon.png" id="titlebar-icon" alt="">
      <span id="titlebar-title">BytesProtector</span>
    </div>
    <div id="titlebar-controls">
      <button class="tb-btn" id="btn-minimize" title="Minimize">&#x2013;</button>
      <button class="tb-btn" id="btn-maximize" title="Maximize">&#x25A1;</button>
      <button class="tb-btn danger" id="btn-close" title="Close">&#x2715;</button>
    </div>
  </div>

  <div id="app">

    <!-- Sidebar -->
    <nav id="sidebar">
      <div id="nav-list">
        <button class="nav-item active" data-page="dashboard">
          <span class="nav-icon">
            <svg viewBox="0 0 20 20" fill="none"><rect x="2" y="2" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="11" y="2" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="2" y="11" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="11" y="11" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/></svg>
          </span>
          <span class="nav-label">Dashboard</span>
        </button>
        <button class="nav-item" data-page="scan">
          <span class="nav-icon">
            <svg viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="7.5" stroke="currentColor" stroke-width="1.5"/><circle cx="10" cy="10" r="3" stroke="currentColor" stroke-width="1.5"/><line x1="10" y1="2.5" x2="10" y2="5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="10" y1="15" x2="10" y2="17.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="2.5" y1="10" x2="5" y2="10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="15" y1="10" x2="17.5" y2="10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          </span>
          <span class="nav-label">Scan</span>
        </button>
        <button class="nav-item" data-page="realtime">
          <span class="nav-icon">
            <svg viewBox="0 0 20 20" fill="none"><path d="M10 2L12.5 7H17.5L13.5 10.5L15 16L10 13L5 16L6.5 10.5L2.5 7H7.5L10 2Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
          </span>
          <span class="nav-label">Real-Time</span>
        </button>
        <button class="nav-item" data-page="endpoint">
          <span class="nav-icon">
            <svg viewBox="0 0 20 20" fill="none"><rect x="2" y="13" width="16" height="5" rx="1.5" stroke="currentColor" stroke-width="1.5"/><path d="M6 13V9a4 4 0 0 1 8 0v4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="10" cy="15.5" r="1" fill="currentColor"/></svg>
          </span>
          <span class="nav-label">Endpoint</span>
        </button>
        <button class="nav-item" data-page="quarantine">
          <span class="nav-icon">
            <svg viewBox="0 0 20 20" fill="none"><path d="M10 2L17 5.5V10C17 13.5 14 16.5 10 18C6 16.5 3 13.5 3 10V5.5L10 2Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><path d="M7 10L9 12L13 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </span>
          <span class="nav-label">Quarantine</span>
        </button>
        <button class="nav-item" data-page="reports">
          <span class="nav-icon">
            <svg viewBox="0 0 20 20" fill="none"><rect x="4" y="2" width="12" height="16" rx="2" stroke="currentColor" stroke-width="1.5"/><line x1="7" y1="7" x2="13" y2="7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="7" y1="10" x2="13" y2="10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="7" y1="13" x2="10" y2="13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          </span>
          <span class="nav-label">Reports</span>
        </button>
        <button class="nav-item" data-page="settings">
          <span class="nav-icon">
            <svg viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="2.5" stroke="currentColor" stroke-width="1.5"/><path d="M10 2v1.5M10 16.5V18M2 10h1.5M16.5 10H18M4.1 4.1l1.05 1.05M14.85 14.85l1.05 1.05M4.1 15.9l1.05-1.05M14.85 5.15l1.05-1.05" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          </span>
          <span class="nav-label">Settings</span>
        </button>
      </div>

      <div id="sidebar-footer">
        <div id="engine-badges">
          <span class="badge">C</span>
          <span class="badge">PY</span>
          <span class="badge">RS</span>
          <span class="badge">AI</span>
        </div>
        <div id="sidebar-version">v1.0.0</div>
      </div>
    </nav>

    <!-- Main content -->
    <main id="content">
      <div id="page-dashboard"  class="page active"></div>
      <div id="page-scan"       class="page"></div>
      <div id="page-realtime"   class="page"></div>
      <div id="page-endpoint"   class="page"></div>
      <div id="page-quarantine" class="page"></div>
      <div id="page-reports"    class="page"></div>
      <div id="page-settings"   class="page"></div>
    </main>

  </div>

  <script src="js/router.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/scan.js"></script>
  <script src="js/realtime.js"></script>
  <script src="js/quarantine.js"></script>
  <script src="js/reports.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
